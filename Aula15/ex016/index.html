<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contador</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Contador</h1>

    <main>
      <div id="start">
        <label for="iinicio">Inicio</label>
        <input type="number" name="inicio" id="iinicio" />
      </div>

      <div id="fim">
        <label for="ifim">Fim</label>
        <input type="number" name="fim" id="ifim" />
      </div>

      <div id="passo">
        <label for="ipasso">Passo</label>
        <input type="number" name="passo" id="ipasso" />
      </div>

      <input type="button" value="Verificar" />

      <div id="resp">A resposta vai aparecer aqui...</div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
