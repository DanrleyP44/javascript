<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Olá, mundo!</h1>
    <p>Livrei-me da maldição</p>

    <script>
      var n1 = Number(prompt('Digite um número: ')); //Conversão de string para number
      var n2 = Number(prompt('Digite outro número: '));
      var soma = n1 + n2;
      alert(`A soma entre ${n1} e ${n2} é ${soma}`); //Template string
      alert(typeof soma); //Conversão de number para string
      alert(typeof String(soma));
    </script>
  </body>
</html>
